name: graphite
status: incubating_pre_1_0
definition: "local-first protocol server where ontology, claims, labs, governance, and tools grow as signed, queryable graph state"
adoption:
  foundation_wide: false
  requires_version: ">=1.0.0"
  requires_signed_decision: "adopt-graphite-1-0"
  requires_external_developer_support: true
properties:
  safe:
    meaning: "separates claims, labs, governance, and doctrine"
    status: candidate
  local:
    meaning: "runs local-first and private-by-default"
    status: candidate
  secure:
    meaning: "uses gated APIs and signed authority records"
    status: candidate
  learning:
    meaning: "supports labs, trials, scoring, method memory"
    status: candidate
  graphable:
    meaning: "objects can be mapped as claims, ontology nodes, decisions, and evidence"
    status: candidate
non_adoption_boundary:
  - "do not use as public foundation language before 1.0"
  - "do not use as stable api before 1.0"
  - "do not invoke informally in future sessions as if adopted"

